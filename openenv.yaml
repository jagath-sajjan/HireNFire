name: HireNFire
short_description: "Hiring benchmark balancing quality and cohort fairness"
description: >
  HireNFire is a real-world OpenEnv environment for structured hiring decisions.
  An agent reviews candidate resumes, chooses who to interview, and finalizes a
  hiring cohort. The final score combines cohort quality with fairness against
  the applicant-pool mix, while intermediate rewards encourage interviewing the
  right ambiguous candidates and penalize invalid or low-signal behavior.

author: jagath-sajjan
version: "1.1.0"
tags:
  - openenv
  - hiring
  - fairness
  - evaluation
  - agent-benchmark

observation_space:
  type: object
  description: >
    Observation includes candidate cards, prior decisions, remaining slots,
    fairness targets, revealed interview scores, and recent environment events.

action_space:
  type: object
  description: >
    The agent may request a resume-only ranking, interview a candidate, hire,
    reject, or finalize the slate.
  actions:
    - RANK
    - INTERVIEW
    - HIRE
    - REJECT
    - FINALIZE

reward:
  description: >
    Final reward = alpha * quality_score + (1 - alpha) * fairness_score.
    Quality compares the selected cohort's hidden value to the optimal cohort.
    Fairness compares selected group counts against pool-proportional targets.
    Partial rewards add signal for useful interviews and penalize invalid or
    wasteful trajectories.

tasks:
  - id: easy
    name: "simple-screen"
    description: >
      Fill three software engineering seats from a balanced pool where the best
      resumes are mostly obvious but a few borderline candidates benefit from
      interview calibration.
    difficulty: easy
    num_candidates: 10
    alpha: 0.72

  - id: medium
    name: "potential-calibration"
    description: >
      Hire a data science cohort where some of the highest-value candidates are
      career switchers or applicants whose interview performance is much better
      than their resume alone suggests.
    difficulty: medium
    num_candidates: 25
    alpha: 0.55

  - id: hard
    name: "fair-panel-hiring"
    description: >
      Build a fair senior ML cohort from a larger, skewed pipeline where
      polished resumes can outperform on paper while underrepresented groups
      contain more hidden-upside candidates that require interviewing to find.
    difficulty: hard
    num_candidates: 50
    alpha: 0.38
